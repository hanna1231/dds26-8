syntax = "proto3";
package orchestrator;

service OrchestratorService {
  rpc StartCheckout(CheckoutRequest) returns (CheckoutResponse);
}

message LineItem {
  string item_id = 1;
  int32 quantity = 2;
}

message CheckoutRequest {
  string order_id = 1;
  string user_id = 2;
  repeated LineItem items = 3;
  int32 total_cost = 4;
}

message CheckoutResponse {
  bool success = 1;
  string error_message = 2;
}
