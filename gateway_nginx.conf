events { worker_connections 2048; }

http {
    # Docker embedded DNS – re-resolves on every request so nginx
    # automatically discovers new replicas and drops dead ones.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location /orders/ {
            set $order order-service;
            rewrite ^/orders/(.*) /$1 break;
            proxy_pass http://$order:5000;
        }
        location /payment/ {
            set $payment payment-service;
            rewrite ^/payment/(.*) /$1 break;
            proxy_pass http://$payment:5000;
        }
        location /stock/ {
            set $stock stock-service;
            rewrite ^/stock/(.*) /$1 break;
            proxy_pass http://$stock:5000;
        }

        access_log  /var/log/nginx/server.access.log;
    }
    access_log  /var/log/nginx/access.log;
}
