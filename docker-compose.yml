services:

  # ---------------------------------------------------------------------------
  # Gateway
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:1.25-bookworm
    restart: always
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  order-service:
    build: ./order
    image: order:latest
    restart: always
    environment:
      - GATEWAY_URL=http://gateway:80
      - ORCHESTRATOR_GRPC_ADDR=orchestrator-service:50053
      - REDIS_NODE_HOST=${ORDER_REDIS_HOST:-order-redis-0}
      - REDIS_PASSWORD=redis
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level info
    depends_on:
      - orchestrator-service

  stock-service:
    build: ./stock
    image: stock:latest
    restart: always
    environment:
      - REDIS_NODE_HOST=${STOCK_REDIS_HOST:-stock-redis-0}
      - REDIS_PASSWORD=redis
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level info

  payment-service:
    build: ./payment
    image: user:latest
    restart: always
    environment:
      - REDIS_NODE_HOST=${PAYMENT_REDIS_HOST:-payment-redis-0}
      - REDIS_PASSWORD=redis
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level info

  orchestrator-service:
    build: ./orchestrator
    image: orchestrator:latest
    restart: always
    environment:
      - STOCK_GRPC_ADDR=stock-service:50051
      - PAYMENT_GRPC_ADDR=payment-service:50051
      - REDIS_NODE_HOST=${ORCH_REDIS_HOST:-payment-redis-0}
      - REDIS_PASSWORD=redis
      - SAGA_STALENESS_SECONDS=${SAGA_STALENESS_SECONDS:-300}
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 1 --log-level info
    depends_on:
      - stock-service
      - payment-service

  # ---------------------------------------------------------------------------
  # Full profile: per-domain Redis Clusters (18 nodes, 6 per domain)
  # Activate with: docker compose --profile full up
  # ---------------------------------------------------------------------------

  # --- Order Redis Cluster ---
  order-redis-0:
    build:
      context: ./docker/redis-cluster
      dockerfile: Dockerfile
    image: redis-cluster:local
    profiles: ["full"]
    restart: always
    environment:
      - REDIS_PASSWORD=redis
      - REDIS_NODES=order-redis-0 order-redis-1 order-redis-2 order-redis-3 order-redis-4 order-redis-5
      - REDIS_PORT_NUMBER=6379
    volumes:
      - order-redis-data-0:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

