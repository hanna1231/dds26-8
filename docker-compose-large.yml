# Large cluster: ~90 CPUs, per-domain Redis clusters, max service replicas
# Usage: docker compose -f docker-compose-large.yml up --build
# Locust target: http://localhost:8000

services:

  # -------------------------------------------------------------------------
  # Gateway – 2 CPUs
  # -------------------------------------------------------------------------
  gateway:
    image: nginx:1.25-bookworm
    restart: always
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - order-service
      - stock-service
      - payment-service
    deploy:
      resources:
        limits:
          cpus: '2'

  # -------------------------------------------------------------------------
  # Application services – heavily scaled
  # -------------------------------------------------------------------------

  # order-service: 6 replicas x 2 CPUs = 12 CPUs
  order-service:
    build: ./order
    image: order:latest
    restart: always
    environment:
      - GATEWAY_URL=http://gateway:80
      - ORCHESTRATOR_GRPC_ADDR=orchestrator-service:50053
      - REDIS_NODE_HOST=order-redis-0
      - REDIS_PASSWORD=redis
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level info
    depends_on:
      orchestrator-service:
        condition: service_started
      order-redis-5:
        condition: service_healthy
    deploy:
      replicas: 6
      resources:
        limits:
          cpus: '2'

  # stock-service: 8 replicas x 2 CPUs = 16 CPUs
  stock-service:
    build: ./stock
    image: stock:latest
    restart: always
    environment:
      - REDIS_NODE_HOST=stock-redis-0
      - REDIS_PASSWORD=redis
      - COMM_MODE=grpc
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level info
    depends_on:
      stock-redis-5:
        condition: service_healthy
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'

  # payment-service: 8 replicas x 2 CPUs = 16 CPUs
  payment-service:
    build: ./payment
    image: payment:latest
    restart: always
    environment:
      - REDIS_NODE_HOST=payment-redis-0
      - REDIS_PASSWORD=redis
      - COMM_MODE=grpc
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 2 --log-level info
    depends_on:
      payment-redis-5:
        condition: service_healthy
    deploy:
      replicas: 8
      resources:
        limits:
          cpus: '2'

  # orchestrator-service: 4 replicas x 2 CPUs = 8 CPUs
  orchestrator-service:
    build: ./orchestrator
    image: orchestrator:latest
    restart: always
    environment:
      - STOCK_GRPC_ADDR=stock-service:50051
      - PAYMENT_GRPC_ADDR=payment-service:50051
      - REDIS_NODE_HOST=payment-redis-0
      - REDIS_PASSWORD=redis
      - SAGA_STALENESS_SECONDS=300
      - COMM_MODE=grpc
      - TRANSACTION_PATTERN=saga
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --workers 1 --log-level info
    depends_on:
      stock-service:
        condition: service_started
      payment-service:
        condition: service_started
      payment-redis-5:
        condition: service_healthy
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '2'

  # -------------------------------------------------------------------------
  # Order Redis Cluster (6 nodes): 6 x 2 CPUs = 12 CPUs
  # -------------------------------------------------------------------------
  order-redis-0:
    build:
      context: ./docker/redis-cluster
      dockerfile: Dockerfile
    image: redis-cluster:local
    restart: always
    environment:
      - REDIS_PASSWORD=redis
      - REDIS_NODES=order-redis-0 order-redis-1 order-redis-2 order-redis-3 order-redis-4 order-redis-5
      - REDIS_PORT_NUMBER=6379
    volumes:
      - order-redis-data-0:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'

  order-redis-1:
    image: redis-cluster:local
    restart: always
    environment:
      - REDIS_PASSWORD=redis
      - REDIS_NODES=order-redis-0 order-redis-1 order-redis-2 order-redis-3 order-redis-4 order-redis-5
      - REDIS_PORT_NUMBER=6379
    volumes:
